[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "bzip2-1.0.6",
    "CC0-1.0",
    "MIT-0",
    "GPL-3.0-only",
    "CDLA-Permissive-2.0"
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
