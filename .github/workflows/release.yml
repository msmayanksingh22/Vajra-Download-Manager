name: "Release"
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            rust_target: ''
          - platform: 'windows-latest'
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'vajra-ui-tauri/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "vajra-${{ matrix.platform }}-${{ matrix.rust_target }}"

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: vajra-ui-tauri

      # Build the vajrad daemon sidecar and copy it to src-tauri so Tauri can bundle it
      - name: Build vajrad sidecar (host target)
        if: matrix.rust_target == ''
        run: cargo build --release --bin vajrad
        working-directory: .

      - name: Build vajrad sidecar (cross target)
        if: matrix.rust_target != ''
        run: cargo build --release --bin vajrad --target ${{ matrix.rust_target }}
        working-directory: .

      - name: Copy vajrad sidecar to src-tauri (host)
        if: matrix.rust_target == ''
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            EXT=".exe"
          else
            EXT=""
          fi
          HOST=$(rustc -vV | grep 'host:' | awk '{print $2}')
          cp "target/release/vajrad${EXT}" "vajra-ui-tauri/src-tauri/vajrad-${HOST}${EXT}"
          echo "Copied: vajrad-${HOST}${EXT}"

      - name: Copy vajrad sidecar to src-tauri (cross)
        if: matrix.rust_target != ''
        shell: bash
        run: |
          TARGET="${{ matrix.rust_target }}"
          EXT=""
          cp "target/${TARGET}/release/vajrad${EXT}" "vajra-ui-tauri/src-tauri/vajrad-${TARGET}${EXT}"
          echo "Copied: vajrad-${TARGET}${EXT}"

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Vajra v__VERSION__ (Beta)"
          releaseBody: |
            ## Vajra Download Manager — Beta Release

            > ⚠️ This is a **beta** release. Features may be incomplete or change.

            ### Download the installer for your platform:
            - **Windows**: `Vajra_*_x64-setup.exe` (NSIS) or `Vajra_*_x64_en-US.msi`
            - **macOS**: `Vajra_*.dmg`
            - **Linux**: `vajra_*_amd64.deb` or `.AppImage`

            See [CHANGELOG](https://github.com/msmayanksingh22/Vajra-Download-Manager/blob/main/CHANGELOG.md) for what's new.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
          projectPath: "vajra-ui-tauri"
          # Skip the beforeBuildCommand since we already built the sidecar above
          # tauri-action will still run npm run build (vite) for the frontend
