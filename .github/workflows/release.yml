name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ui:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: -> target

      - name: install frontend dependencies
        working-directory: ./vajra-ui-tauri
        run: npm install

      - name: Build frontend
        working-directory: ./vajra-ui-tauri
        run: npm run build

      - name: Build Vajra Daemon sidecar
        run: |
          cargo build --release --bin vajrad
          mkdir -p vajra-ui-tauri/src-tauri/bin
          # Handle Windows .exe extension
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp target/release/vajrad.exe vajra-ui-tauri/src-tauri/bin/vajrad-${{ matrix.target }}.exe
          else
            cp target/release/vajrad vajra-ui-tauri/src-tauri/bin/vajrad-${{ matrix.target }}
          fi

      - name: Setup EV Code Signing (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.CERTIFICATE_BASE64 }}")
          [IO.File]::WriteAllBytes("cert.pfx", $pfx_cert_byte)
        shell: pwsh

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          SIGN_TOOL: signtool
          CERTIFICATE_PATH: cert.pfx
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        with:
          projectPath: ./vajra-ui-tauri
          tagName: vajra-${{ github.ref_name }}
          releaseName: 'Vajra ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

