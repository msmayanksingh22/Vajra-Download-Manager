name: "Release"
on:
  push:
    tags:
      - 'v*'

env:
  RUSTFLAGS: "--cfg reqwest_unstable"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            rust_target: ''
          - platform: 'windows-latest'
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'vajra-ui-tauri/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "vajra-${{ matrix.platform }}-${{ matrix.rust_target }}"

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: vajra-ui-tauri

      # Build the vajrad daemon and vajra CLI sidecars and copy them to src-tauri/bin
      - name: Build sidecars (host target)
        if: matrix.rust_target == ''
        run: cargo build --release --bin vajrad --bin vajra-cli
        working-directory: .

      - name: Build sidecars (cross target)
        if: matrix.rust_target != ''
        run: cargo build --release --bin vajrad --bin vajra-cli --target ${{ matrix.rust_target }}
        working-directory: .

      - name: Copy sidecars to src-tauri/bin (host)
        if: matrix.rust_target == ''
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            EXT=".exe"
          else
            EXT=""
          fi
          HOST=$(rustc -vV | grep 'host:' | awk '{print $2}')
          mkdir -p vajra-ui-tauri/src-tauri/bin
          cp "target/release/vajrad${EXT}" "vajra-ui-tauri/src-tauri/bin/vajrad-${HOST}${EXT}"
          cp "target/release/vajra-cli${EXT}" "vajra-ui-tauri/src-tauri/bin/vajra-cli-${HOST}${EXT}"
          echo "Copied: vajrad-${HOST}${EXT} and vajra-cli-${HOST}${EXT}"

      - name: Copy sidecars to src-tauri/bin (cross)
        if: matrix.rust_target != ''
        shell: bash
        run: |
          TARGET="${{ matrix.rust_target }}"
          EXT=""
          mkdir -p vajra-ui-tauri/src-tauri/bin
          cp "target/${TARGET}/release/vajrad${EXT}" "vajra-ui-tauri/src-tauri/bin/vajrad-${TARGET}${EXT}"
          cp "target/${TARGET}/release/vajra-cli${EXT}" "vajra-ui-tauri/src-tauri/bin/vajra-cli-${TARGET}${EXT}"
          echo "Copied: vajrad-${TARGET}${EXT} and vajra-cli-${TARGET}${EXT}"

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "--cfg reqwest_unstable"
          TARGET: ${{ matrix.rust_target }}
        with:
          tagName: v__VERSION__
          releaseName: "Vajra v__VERSION__ — Public Beta"
          releaseBody: |
            <div align="center">
              <h2>⚡ Vajra Download Manager v__VERSION__ — Public Beta</h2>
              <p><strong>The high-performance, open-source download manager built in Rust + Tauri.</strong></p>
            </div>

            > ⚠️ **Beta Release** — Core features are stable and ready for daily use. Some edge cases may not be handled yet. Please [report any bugs](https://github.com/msmayanksingh22/Vajra-Download-Manager/issues/new) you encounter!

            ---

            ## 🚀 What Is Vajra?

            Vajra replaces your browser's slow, single-connection downloader with a **parallel multi-segment engine** that saturates your full bandwidth. It includes a desktop GUI, browser extension, CLI, and a full REST API — all powered by a headless Rust daemon.

            ---

            ## ⬇️ Download the Right Installer

            | Platform | File | Notes |
            |:---|:---|:---|
            | **Windows 10/11 (64-bit)** | `Vajra_*_x64-setup.exe` | Recommended — NSIS wizard installer |
            | **Windows 10/11 (64-bit)** | `Vajra_*_x64_en-US.msi` | Alternative MSI format |
            | **macOS Apple Silicon (M1/M2/M3)** | `Vajra_*_aarch64.dmg` | |
            | **macOS Intel** | `Vajra_*_x64.dmg` | |
            | **Linux Debian/Ubuntu** | `vajra_*_amd64.deb` | `sudo apt install ./vajra_*.deb` |
            | **Linux (Universal)** | `Vajra_*_amd64.AppImage` | `chmod +x` then run |
            | **Browser Extension** | `vajra-extension.zip` | Load unpacked in Chrome/Edge/Brave |

            > **Windows SmartScreen warning?** Click "More info" → "Run anyway". This is a false positive for new open-source software.
            > **macOS Gatekeeper warning?** Right-click the app → Open → Click "Open". Only needed once.

            ---

            ## ✨ Key Features in This Release

            - ⚡ **Parallel multiplexing** — split downloads into up to 32 simultaneous segments
            - 🧠 **Connection stealing** — idle threads automatically help the slowest segment
            - 💾 **OS-level file pre-allocation** — no fragmentation, no "disk full" surprises
            - 🚀 **Zero-copy memory-mapped I/O** — flat RAM usage even for huge files
            - 🔒 **VPN Kill Switch** — pauses all downloads if your VPN interface drops
            - 🌐 **Chrome/Edge/Brave extension** — intercepts download links automatically
            - 💻 **CLI** (`vajra get <URL>`) — fully scriptable from the terminal
            - 🔌 **REST API** at `http://127.0.0.1:6277/api/v1` with Swagger UI
            - 📋 **IDM `.ef2` import** — migrate your existing download lists

            ---

            ## 📖 Full Documentation

            See the **[README](https://github.com/msmayanksingh22/Vajra-Download-Manager#readme)** for complete installation instructions, CLI reference, and API docs.
            See the **[CHANGELOG](https://github.com/msmayanksingh22/Vajra-Download-Manager/blob/main/CHANGELOG.md)** for what's new in this version.

            ---

            ## 🐛 Found a Bug?

            Please [open an issue](https://github.com/msmayanksingh22/Vajra-Download-Manager/issues/new) — it helps everyone!
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
          projectPath: "vajra-ui-tauri"
          # Skip the beforeBuildCommand since we already built the sidecar above
          # tauri-action will still run npm run build (vite) for the frontend

